services:
  postgres:
    image: postgres:16-alpine
    container_name: dgram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dgram
      POSTGRES_PASSWORD: dgram
      POSTGRES_DB: dgram
    ports:
      # Host 5434 → container 5432 (5432/5433 are used by other local DBs).
      - "5434:5432"
    volumes:
      - dgram_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dgram -d dgram"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dgram_pgdata:
